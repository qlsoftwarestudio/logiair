spring.application.name=gestor-reservas
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:appdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging Configuration
logging.level.com.sportflow.gestor_reservas=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
jwt.secret=${JWT_SECRET:my-super-secret-key-for-development-1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
