spring.application.name=logiair-os

# Test Profile Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console completely disabled
spring.h2.console.enabled=false

# JPA Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console servlet
spring.h2.console.settings.web-allow-others=false

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Logging Configuration
logging.level.com.logiair.os=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
jwt.secret=test-secret-key-for-testing-1234567890
jwt.expiration=86400000

# Multi-tenancy Configuration
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.logiair.os.tenant.TenantIdentifierResolver

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN
